<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino">
<meta name="theme-color" content="#0a0a0a">
<title>Treino Rafael</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0a0a0a; color:#f5f3ee; font-family:'DM Sans',sans-serif; min-height:100vh; }
.hdr { padding:28px 20px 20px; border-bottom:1px solid #2a2a2a; }
.hdr-tag { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#f5a623; font-weight:600; margin-bottom:4px; }
.hdr-title { font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:1px; }
.hdr-sub { font-size:12px; color:#777; margin-top:6px; }
.tabs { display:flex; overflow-x:auto; padding:14px 20px; gap:8px; border-bottom:1px solid #2a2a2a; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex-shrink:0; padding:7px 16px; border-radius:20px; border:1px solid #2a2a2a; font-size:13px; font-weight:500; color:#777; cursor:pointer; background:transparent; }
.tab.on { background:rgba(245,166,35,0.12); border-color:#f5a623; color:#f5a623; }
.body { padding:16px 20px 40px; }
.dlabel { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#777; font-weight:600; margin-bottom:14px; }
.ex { background:#1c1c1c; border-radius:10px; padding:14px; margin-bottom:10px; position:relative; overflow:hidden; }
.ex::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:#f5a623; }
.ex-name { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:0.5px; margin-bottom:2px; }
.ex-vol { font-size:11px; color:#777; letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
.grid { width:100%; border-collapse:collapse; margin-bottom:8px; }
.grid th { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#777; font-weight:600; padding:0 4px 6px; text-align:center; }
.grid th:first-child { text-align:left; width:36px; }
.grid td { padding:3px 4px; }
.grid td:first-child { font-size:12px; color:#777; font-weight:600; padding-top:6px; }
.grid input { width:100%; background:#252525; border:1px solid #2a2a2a; border-radius:6px; color:#f5f3ee; font-size:15px; font-family:'DM Sans',sans-serif; padding:7px 4px; text-align:center; }
.grid input:focus { outline:none; border-color:#f5a623; }
.unit { font-size:10px; color:#777; text-align:center; display:block; margin-top:2px; }
.hint { font-size:11px; color:#777; margin:2px 0 8px; }
.note { width:100%; background:#252525; border:1px solid #2a2a2a; border-radius:6px; color:#f5f3ee; font-size:13px; font-family:'DM Sans',sans-serif; padding:8px 10px; margin-top:4px; }
.note:focus { outline:none; border-color:#f5a623; }
.note::placeholder { color:#555; }
.hist { margin-top:12px; border-top:1px solid #2a2a2a; padding-top:10px; }
.hist-ttl { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#777; font-weight:600; margin-bottom:8px; }
.hist-row { display:flex; justify-content:space-between; align-items:flex-start; padding:5px 0; border-bottom:1px solid #1e1e1e; }
.hist-row:last-child { border-bottom:none; }
.hist-date { font-size:12px; color:#777; flex-shrink:0; margin-right:8px; }
.hist-val { font-size:12px; font-weight:500; text-align:right; line-height:1.7; }
.hist-note { font-size:11px; color:#777; font-style:italic; padding:2px 0 4px; }
.up { color:#4ade80; }
.dn { color:#f87171; }
.btns { display:flex; gap:10px; padding:16px 20px 40px; }
.btn { padding:14px; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; flex:1; }
.btn-main { background:#f5a623; color:#000; }
.btn-sec { background:#1c1c1c; color:#f5a623; border:1px solid #f5a623; }
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1a2e1a; border:1px solid #4ade80; color:#4ade80; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:500; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; z-index:99; }
.toast.on { opacity:1; }
.overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.88); z-index:999; padding:24px; overflow-y:auto; }
.modal { background:#1c1c1c; border-radius:12px; padding:20px; }
.modal-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.modal-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; }
.modal-close { background:none; border:none; color:#777; font-size:26px; cursor:pointer; line-height:1; }
.modal-sub { font-size:12px; color:#777; margin-bottom:12px; }
textarea { width:100%; height:280px; background:#111; border:1px solid #333; border-radius:8px; color:#f5f3ee; font-size:12px; font-family:monospace; padding:12px; line-height:1.6; }
.mbtn { width:100%; padding:12px; border:none; border-radius:8px; font-weight:600; font-size:14px; cursor:pointer; margin-top:12px; }
.mbtn-copy { background:#f5a623; color:#000; }
.mbtn-del { background:transparent; border:1px solid #f87171; color:#f87171; font-size:13px; }
.confirm-msg { font-size:13px; color:#f87171; text-align:center; margin-bottom:10px; }
.confirm-row { display:flex; gap:8px; }
.confirm-cancel { flex:1; padding:10px; background:transparent; border:1px solid #555; border-radius:8px; color:#aaa; font-size:13px; cursor:pointer; }
.confirm-ok { flex:1; padding:10px; background:#f87171; border:none; border-radius:8px; color:#000; font-weight:600; font-size:13px; cursor:pointer; }
</style>
</head>
<body>
 
<div class="hdr">
  <div class="hdr-tag">Protocolo Rafael &middot; Semana 1</div>
  <div class="hdr-title">LOG DE TREINO</div>
  <div class="hdr-sub" id="sub"></div>
</div>
<div class="tabs" id="tabs"></div>
<div class="body" id="body"></div>
<div class="btns">
  <button class="btn btn-main" onclick="saveSession()">Salvar treino</button>
  <button class="btn btn-sec" onclick="openModal()">Exportar</button>
</div>
<div class="toast" id="toast"></div>
 
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">RELATORIO</span>
      <button class="modal-close" onclick="closeModal()">x</button>
    </div>
    <div class="modal-sub">Copie e cole no Claude para analise.</div>
    <textarea id="report" readonly></textarea>
    <button class="mbtn mbtn-copy" id="copybtn" onclick="copyReport()">Copiar relatorio</button>
    <div id="del1">
      <button class="mbtn mbtn-del" onclick="showConfirm()">Apagar todos os dados</button>
    </div>
    <div id="del2" style="display:none;margin-top:12px;">
      <div class="confirm-msg">Tem certeza? Nao tem como desfazer.</div>
      <div class="confirm-row">
        <button class="confirm-cancel" onclick="hideConfirm()">Cancelar</button>
        <button class="confirm-ok" onclick="clearData()">Sim, apagar</button>
      </div>
    </div>
  </div>
</div>
 
<script>
var T = {
  A: { label:"A - Seg", dow:1, ex:[
    { id:"goblet",      nome:"Goblet Squat",        vol:"5x8",  n:5 },
    { id:"supino",      nome:"Supino Reto",          vol:"5x8",  n:5, hint:"peso total: barra + anilhas" },
    { id:"hollow",      nome:"Hollow Hold",          vol:"5x20s",n:5, unit:"s", nopeso:true },
    { id:"ext_lom",     nome:"Extensao de Lombar",   vol:"5x10", n:5 },
    { id:"elev_pern",   nome:"Elevacao de Pernas",   vol:"5x10", n:5, nopeso:true },
    { id:"manguito_a",  nome:"Manguito Rotador",     vol:"5x10", n:5 }
  ]},
  B: { label:"B - Ter", dow:2, ex:[
    { id:"barra",       nome:"Barra Fixa",           vol:"5x5",  n:5, nopeso:true },
    { id:"remada",      nome:"Remada Curvada",        vol:"5x8",  n:5, hint:"peso total: barra + anilhas" },
    { id:"desen",       nome:"Desenvolvimento",       vol:"5x8",  n:5 },
    { id:"deadhang",    nome:"Dead Hang",             vol:"5xmax",n:5, unit:"s", nopeso:true },
    { id:"manguito_b",  nome:"Manguito Rotador",      vol:"5x10", n:5 }
  ]},
  C: { label:"C - Qui", dow:4, ex:[
    { id:"terra",       nome:"Levantamento Terra",    vol:"5x3",  n:5, hint:"peso total: barra + anilhas" },
    { id:"stiff",       nome:"Stiff",                 vol:"5x8",  n:5, hint:"peso total: barra + anilhas" },
    { id:"pallof",      nome:"Pallof Press",          vol:"5x10", n:5 }
  ]},
  D: { label:"D - Sex", dow:5, ex:[
    { id:"paralelas",   nome:"Paralelas",             vol:"5x5",  n:5, nopeso:true },
    { id:"frontal",     nome:"Agach. Frontal/Goblet", vol:"5x8",  n:5 },
    { id:"farmer",      nome:"Farmer Walk",           vol:"6x30m",n:6 }
  ]}
};
 
var active = "A";
 
function getH() { try { return JSON.parse(localStorage.getItem("rfh")||"{}"); } catch(e) { return {}; } }
function getC() { try { return JSON.parse(localStorage.getItem("rfc")||"{}"); } catch(e) { return {}; } }
function setH(v) { localStorage.setItem("rfh", JSON.stringify(v)); }
function setC(v) { localStorage.setItem("rfc", JSON.stringify(v)); }
 
function today() {
  var d = new Date();
  var dd = String(d.getDate()).padStart(2,"0");
  var mm = String(d.getMonth()+1).padStart(2,"0");
  var yy = d.getFullYear();
  return dd+"/"+mm+"/"+yy;
}
 
function dateForDow(dow) {
  var now = new Date();
  var diff = dow - now.getDay();
  var d = new Date(now.getTime() + diff*86400000);
  var dd = String(d.getDate()).padStart(2,"0");
  var mm = String(d.getMonth()+1).padStart(2,"0");
  var yy = d.getFullYear();
  return dd+"/"+mm+"/"+yy;
}
 
function render() {
  var tr = T[active];
  var dayNames = {1:"Segunda",2:"Terca",3:"Quarta",4:"Quinta",5:"Sexta",6:"Sabado",0:"Domingo"};
  document.getElementById("sub").textContent = dayNames[tr.dow] + " - " + dateForDow(tr.dow);
 
  var tabsHtml = "";
  var keys = ["A","B","C","D"];
  for (var i=0; i<keys.length; i++) {
    var k = keys[i];
    tabsHtml += '<div class="tab'+(k===active?" on":"")+'" onclick="setTab(\''+k+'\')">'+T[k].label+'</div>';
  }
  document.getElementById("tabs").innerHTML = tabsHtml;
 
  renderBody();
}
 
function setTab(t) { active = t; render(); }
 
function renderBody() {
  var tr = T[active];
  var hist = getH()[active] || [];
  var cur = getC()[active] || {};
  var html = '<div class="dlabel">Semana atual</div>';
 
  for (var ei=0; ei<tr.ex.length; ei++) {
    var ex = tr.ex[ei];
    var unit = ex.unit || "kg";
    var c = cur[ex.id] || {};
    var sr = c.sr || [];
 
    var grid = '<table class="grid"><thead><tr><th>Serie</th>';
    if (!ex.nopeso) grid += "<th>Peso</th>";
    grid += "<th>Reps</th></tr></thead><tbody>";
 
    for (var s=0; s<ex.n; s++) {
      var sv = sr[s] || {};
      grid += "<tr><td>S"+(s+1)+"</td>";
      if (!ex.nopeso) {
        grid += '<td><input type="number" inputmode="decimal" placeholder="0" value="'+(sv.p||"")+'" oninput="updS(\''+ex.id+'\','+s+',\'p\',this.value)"><span class="unit">'+unit+'</span></td>';
      }
      grid += '<td><input type="number" inputmode="numeric" placeholder="0" value="'+(sv.r||"")+'" oninput="updS(\''+ex.id+'\','+s+',\'r\',this.value)"><span class="unit">reps</span></td>';
      grid += "</tr>";
    }
    grid += "</tbody></table>";
    if (ex.hint) grid += '<div class="hint">* '+ex.hint+'</div>';
 
    var exHist = [];
    for (var hi=hist.length-1; hi>=0 && exHist.length<4; hi--) {
      var hs = hist[hi];
      if (hs.ex && hs.ex[ex.id] && hs.ex[ex.id].sr && hs.ex[ex.id].sr.length) {
        exHist.push({ date: hs.date, sr: hs.ex[ex.id].sr, note: hs.ex[ex.id].note||"" });
      }
    }
 
    var histHtml = "";
    if (exHist.length) {
      histHtml = '<div class="hist"><div class="hist-ttl">Historico</div>';
      for (var hi2=0; hi2<exHist.length; hi2++) {
        var h = exHist[hi2];
        var parts = [];
        for (var si=0; si<h.sr.length; si++) {
          var sv2 = h.sr[si];
          var part = "S"+(si+1)+":";
          if (sv2.p) part += " "+sv2.p+(unit);
          if (sv2.r) part += " x"+sv2.r;
          if (sv2.p || sv2.r) parts.push(part);
        }
        var arrow = "";
        if (hi2 < exHist.length-1 && !ex.nopeso) {
          var prev = exHist[hi2+1];
          var maxC=0, maxP=0;
          for (var si2=0; si2<h.sr.length; si2++) { if (parseFloat(h.sr[si2].p)>maxC) maxC=parseFloat(h.sr[si2].p); }
          for (var si3=0; si3<prev.sr.length; si3++) { if (parseFloat(prev.sr[si3].p)>maxP) maxP=parseFloat(prev.sr[si3].p); }
          if (maxC>maxP) arrow='<span class="up"> ↑</span>';
          else if (maxC<maxP) arrow='<span class="dn"> ↓</span>';
        }
        histHtml += '<div class="hist-row"><span class="hist-date">'+h.date+'</span><span class="hist-val">'+parts.join(" · ")+arrow+'</span></div>';
        if (h.note) histHtml += '<div class="hist-note">'+h.note+'</div>';
      }
      histHtml += "</div>";
    }
 
    html += '<div class="ex"><div class="ex-name">'+ex.nome+'</div><div class="ex-vol">'+ex.vol+'</div>'+grid+'<input class="note" placeholder="Observacao..." value="'+(c.note||"")+'" oninput="updNote(\''+ex.id+'\',this.value)">'+histHtml+'</div>';
  }
 
  document.getElementById("body").innerHTML = html;
}
 
function updS(exId, idx, field, val) {
  var cur = getC();
  if (!cur[active]) cur[active] = {};
  if (!cur[active][exId]) cur[active][exId] = { sr:[] };
  if (!cur[active][exId].sr) cur[active][exId].sr = [];
  while (cur[active][exId].sr.length <= idx) cur[active][exId].sr.push({});
  cur[active][exId].sr[idx][field] = val;
  setC(cur);
}
 
function updNote(exId, val) {
  var cur = getC();
  if (!cur[active]) cur[active] = {};
  if (!cur[active][exId]) cur[active][exId] = { sr:[] };
  cur[active][exId].note = val;
  setC(cur);
}
 
function saveSession() {
  var hist = getH();
  var cur = getC();
  var tr = T[active];
  var d = today();
  if (!hist[active]) hist[active] = [];
  var ex = {};
  for (var i=0; i<tr.ex.length; i++) {
    var e = tr.ex[i];
    var c = (cur[active]||{})[e.id] || {};
    if (c.sr && c.sr.some(function(s){ return s.p || s.r; })) {
      ex[e.id] = { sr: c.sr, note: c.note||"" };
    }
  }
  var idx = -1;
  for (var i=0; i<hist[active].length; i++) { if (hist[active][i].date===d) { idx=i; break; } }
  if (idx>=0) hist[active][idx] = { date:d, ex:ex };
  else hist[active].push({ date:d, ex:ex });
  setH(hist);
  cur[active] = {};
  setC(cur);
  showToast("Treino salvo!");
  renderBody();
}
 
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast on";
  setTimeout(function(){ t.className = "toast"; }, 2000);
}
 
function openModal() {
  var hist = getH();
  var lines = ["RELATORIO DE TREINO - RAFAEL","================================",""];
  var keys = ["A","B","C","D"];
  for (var ki=0; ki<keys.length; ki++) {
    var k = keys[ki];
    var tr = T[k];
    var sessions = hist[k] || [];
    if (!sessions.length) continue;
    lines.push("TREINO "+tr.label.toUpperCase());
    lines.push("---");
    for (var si=0; si<sessions.length; si++) {
      var s = sessions[si];
      lines.push("Data: "+s.date);
      for (var ei=0; ei<tr.ex.length; ei++) {
        var ex = tr.ex[ei];
        var d = s.ex && s.ex[ex.id];
        if (!d || !d.sr) continue;
        lines.push("  "+ex.nome+":");
        for (var sri=0; sri<d.sr.length; sri++) {
          var sr = d.sr[sri];
          var row = "    S"+(sri+1)+":";
          if (sr.p) row += " "+sr.p+(ex.unit||"kg");
          if (sr.r) row += " x "+sr.r+" reps";
          if (sr.p || sr.r) lines.push(row);
        }
        if (d.note) lines.push("    Obs: "+d.note);
      }
      lines.push("");
    }
  }
  document.getElementById("report").value = lines.join("\n");
  document.getElementById("overlay").style.display = "block";
}
 
function closeModal() { document.getElementById("overlay").style.display = "none"; }
 
function copyReport() {
  var ta = document.getElementById("report");
  ta.select();
  document.execCommand("copy");
  document.getElementById("copybtn").textContent = "Copiado!";
  setTimeout(function(){ document.getElementById("copybtn").textContent = "Copiar relatorio"; }, 2000);
}
 
function showConfirm() {
  document.getElementById("del1").style.display = "none";
  document.getElementById("del2").style.display = "block";
}
 
function hideConfirm() {
  document.getElementById("del1").style.display = "block";
  document.getElementById("del2").style.display = "none";
}
 
function clearData() {
  localStorage.removeItem("rfh");
  localStorage.removeItem("rfc");
  hideConfirm();
  closeModal();
  showToast("Dados apagados!");
  render();
}
 
render();
</script>
</body>
</html>
